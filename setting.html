<!DOCTYPE html>
<html>
<head>
    <title>Settings</title>
    <link rel="stylesheet" href="setting.css">
    </head>

<body>


<div class="container">

<h1>Settings</h1>

<div class="section">
    <h3>Export Data</h3>
    <textarea id="exportb"></textarea>
    <button class="btn expbtn">Copy Data</button>
</div>

<div class="section">
    <h3>Import Data</h3>
    <textarea id="importb" placeholder="Paste your JSON here..."></textarea>
    <button class="btn impbtn">Load Data</button>
</div>

<button class="btn resbtn">Restore Previous Data</button>

</div>

<script src="setting.js"></script>

</body>
</html>
