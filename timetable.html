<!DOCTYPE html>
<html>
<head>
    <title>Timetable</title>
    <link rel="stylesheet" href="timetable.css">
 </head>

<body>

<div class="container">

<h1>Set Timetable</h1>

<div class="day">
    <h3>Monday</h3>
    <input type="text" placeholder="Enter subjects comma separated" id="Monday">
</div>

<div class="day">
    <h3>Tuesday</h3>
    <input type="text" id="Tuesday">
</div>

<div class="day">
    <h3>Wednesday</h3>
    <input type="text" id="Wednesday">
</div>

<div class="day">
    <h3>Thursday</h3>
    <input type="text" id="Thursday">
</div>

<div class="day">
    <h3>Friday</h3>
    <input type="text" id="Friday">
</div>



<button class="btn">Save Timetable</button>

</div>

<script src="timetable.js"></script>

</body>
</html>
